            questionsContent.innerHTML = html;
        }

        function loadVocabulary() {
            const data = topicsData[currentTopic];
            const vocabularyContent = document.getElementById('vocabulary-content');
            
            let html = `
                <h2 class="section-title">📚 Vocabulary & Phrases</h2>
            `;
            
            // Add vocabulary sections - handle both old object format and new array format
            if (Array.isArray(data.vocabulary)) {
                // New array format: [{title: "...", words: [...]}, ...]
                data.vocabulary.forEach(section => {
                    html += `
                        <div class="vocabulary-section">
                            <h3 class="vocab-title">${section.title}</h3>
                            <div class="vocab-content">
                                <ul class="vocab-list">
                                    ${section.words.map(item => `<li>${item}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    `;
                });
            } else {
                // Old object format: {"title": [...], ...}
                Object.entries(data.vocabulary).forEach(([title, items]) => {
                    html += `
                        <div class="vocabulary-section">
                            <h3 class="vocab-title">${title}</h3>
                            <div class="vocab-content">
                                <ul class="vocab-list">
                                    ${items.map(item => `<li>${item}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    `;
                });
            }
            
            // Add sample ideas
            html += `
                <div class="sample-ideas">
                    <h4>${data.sampleIdeas.title}</h4>
                    <p>${data.sampleIdeas.content}</p>
                </div>
            `;
            
            vocabularyContent.innerHTML = html;
        }

        function toggleIdeas(index) {
            const ideasDiv = document.getElementById(`ideas-${index}`);
            const questionDiv = ideasDiv.parentElement;
            
            if (ideasDiv.classList.contains('show')) {
                ideasDiv.classList.remove('show');
                questionDiv.classList.remove('active');
            } else {
                // Hide all other ideas first
                document.querySelectorAll('.part3-ideas').forEach(div => {
                    div.classList.remove('show');
                    div.parentElement.classList.remove('active');
                });
                
                // Show clicked ideas
                ideasDiv.classList.add('show');
                questionDiv.classList.add('active');
            }
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            loadQuestions();
            loadVocabulary();
        });
    </script>
</body>
</html>
