    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8d7da 0%, #e8d5f2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #e8b4cb 0%, #c8a2c8 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .topic-selector {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
        }

        .topic-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .topic-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .topic-btn:hover {
            background: #495057;
            transform: translateY(-2px);
        }

        .topic-btn.active {
            background: #d8a7ca;
            box-shadow: 0 4px 15px rgba(216,167,202,0.3);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 600px;
        }

        .questions-panel {
            background: #fff;
            padding: 30px;
            border-right: 1px solid #e9ecef;
        }

        .vocabulary-panel {
            background: #f8f9fa;
            padding: 30px;
        }

        .panel-title {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #2c3e50;
            border-bottom: 3px solid #d8a7ca;
            padding-bottom: 10px;
        }

        .question-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            border-left: 4px solid #d8a7ca;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .question-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .question-item.active {
            background: #d8a7ca;
            color: white;
        }

        .question-text {
            font-weight: 500;
            margin-bottom: 10px;
        }

        .sample-answer {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #d8a7ca;
            margin-top: 10px;
            display: none;
            font-style: italic;
            color: #2c3e50;
        }

        .sample-answer.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .click-hint {
            font-size: 0.85em;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .vocab-section {
            margin-bottom: 25px;
        }

        .vocab-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #495057;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .vocab-title::before {
            content: '📝';
            margin-right: 8px;
        }

        .vocab-list {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }

        .vocab-item {
            padding: 8px 0;
            border-bottom: 1px solid #f1f3f4;
        }

        .vocab-item:last-child {
            border-bottom: none;
        }

        .vocab-term {
            font-weight: 600;
            color: #d8a7ca;
        }

        .vocab-example {
            font-style: italic;
            color: #6c757d;
            margin-top: 4px;
        }

        .phrase-box {
            background: linear-gradient(135deg, #f8d7da 0%, #e8d5f2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .phrase-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .questions-panel {
                border-right: none;
                border-bottom: 1px solid #e9ecef;
            }
            
            .topic-buttons {
                justify-content: flex-start;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>

        let currentTopic = 'weather';
        let selectedQuestion = null;

        function displayQuestions(topic) {
            const container = document.getElementById('questions-container');
            const questions = topicsData[topic].questions;
            
            container.innerHTML = questions.map((questionObj, index) => {
                // Handle both old format (string) and new format (object)
                const questionText = typeof questionObj === 'string' ? questionObj : questionObj.question;
                const answerText = typeof questionObj === 'object' ? questionObj.answer : '';
                
                return `
                    <div class="question-item" data-index="${index}">
                        <div class="question-text">${questionText}</div>
                        ${answerText ? `
                            <div class="sample-answer" id="answer-${index}">
                                <strong>Sample Answer:</strong><br>
                                ${answerText}
                            </div>
                            <div class="click-hint">💡 Click to show/hide sample answer</div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            // Add click listeners to questions
            container.querySelectorAll('.question-item').forEach(item => {
                item.addEventListener('click', () => {
                    const index = item.dataset.index;
                    const answerElement = document.getElementById(`answer-${index}`);
                    
                    if (answerElement) {
                        // Toggle the sample answer visibility
                        const isVisible = answerElement.classList.contains('show');
                        
                        if (isVisible) {
                            answerElement.classList.remove('show');
                            item.classList.remove('active');
                        } else {
                            // Hide all other answers first
                            container.querySelectorAll('.sample-answer').forEach(answer => {
                                answer.classList.remove('show');
                            });
                            container.querySelectorAll('.question-item').forEach(q => {
                                q.classList.remove('active');
                            });
                            
                            // Show the clicked answer
                            answerElement.classList.add('show');
                            item.classList.add('active');
                        }
                    }
                });
            });
        }

        function displayVocabulary(topic) {
            const container = document.getElementById('vocabulary-container');
            const vocab = topicsData[topic].vocabulary;
            
            let html = '';
            for (const [section, items] of Object.entries(vocab)) {
                html += `
                    <div class="vocab-section">
                        <div class="vocab-title">${section}</div>
                        <div class="vocab-list">
                `;
                
                items.forEach(item => {
                    if (section === 'Sample Response') {
                        html += `<div class="phrase-box">
                                    <div class="phrase-title">Example:</div>
                                    ${item}
                                </div>`;
                    } else {
                        html += `<div class="vocab-item">${item}</div>`;
                    }
                });
                
                html += `</div></div>`;
            }
            
            container.innerHTML = html;
        }

        function switchTopic(topic) {
            currentTopic = topic;
            
            // Update button states
            document.querySelectorAll('.topic-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.topic === topic) {
                    btn.classList.add('active');
                }
            });
            
            // Update content
            displayQuestions(topic);
            displayVocabulary(topic);
            selectedQuestion = null;
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', () => {
            // Add click listeners to topic buttons
            document.querySelectorAll('.topic-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    switchTopic(btn.dataset.topic);
                });
            });
            
            // Load initial topic
            switchTopic('weather');
        });
    </script>
