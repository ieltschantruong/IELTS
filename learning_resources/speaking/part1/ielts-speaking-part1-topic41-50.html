<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Speaking Part 1 - Batch 5 (Topics 41-50)</title>
    <style>
        :root {
            /* Royal Purple / Lavender Theme */
            --primary-color: #9d4edd; 
            --secondary-color: #c77dff;
            --accent-color: #240046;
            --text-color: #10002b;
            --bg-gradient: linear-gradient(135deg, #f3e8ff 0%, #e0aaff 100%);
            --card-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        .header {
            background: linear-gradient(135deg, #7b2cbf 0%, #5a189a 100%);
            color: white;
            padding: 20px 30px;
            text-align: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 2em;
            font-weight: 300;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        /* Topic Selector */
        .topic-selector {
            background: #f8f7ff;
            padding: 15px 20px;
            border-bottom: 1px solid #e0aaff;
            white-space: nowrap;
            overflow-x: auto;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }

        .topic-buttons {
            display: inline-flex;
            gap: 10px;
        }

        .topic-btn {
            background: #fff;
            color: var(--accent-color);
            border: 1px solid #c77dff;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .topic-btn:hover {
            background: #e0aaff;
            transform: translateY(-1px);
        }

        .topic-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 4px 10px rgba(157, 78, 221, 0.4);
        }

        /* Main Content Grid */
        .main-content {
            display: grid;
            grid-template-columns: 40% 60%;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Questions Panel */
        .questions-panel {
            background: #fff;
            padding: 25px;
            border-right: 1px solid #e0aaff;
            overflow-y: auto;
        }

        .question-item {
            background: #f8f7ff;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--primary-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .question-item:hover {
            background: #f3e8ff;
            transform: translateX(3px);
        }

        .question-item.active {
            background: var(--primary-color);
            color: white;
        }

        .question-text {
            font-weight: 600;
            line-height: 1.4;
        }

        .sample-answer {
            background: rgba(255,255,255,0.95);
            padding: 15px;
            border-radius: 8px;
            margin-top: 12px;
            display: none;
            color: #3c096c;
            font-size: 0.95em;
            line-height: 1.5;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
        }

        .question-item.active .sample-answer {
            color: #10002b;
        }

        .sample-answer.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        /* Vocabulary Panel */
        .vocabulary-panel {
            background: #fcfaff;
            padding: 25px;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Vocab Styles */
        .vocab-grid {
            display: grid;
            gap: 20px;
        }

        .vocab-card {
            background: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            border: 1px solid #e0aaff;
        }

        .vocab-header {
            background: #f3e8ff;
            padding: 12px 20px;
            font-weight: 700;
            color: var(--text-color);
            border-bottom: 1px solid #e0aaff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vocab-header.vocab-type { border-left: 4px solid #7b2cbf; }
        .vocab-header.expression-type { border-left: 4px solid #9d4edd; }

        .vocab-content { padding: 0; }

        .vocab-row {
            padding: 15px 20px;
            border-bottom: 1px solid #f3e8ff;
            transition: background 0.2s;
        }

        .vocab-row:last-child { border-bottom: none; }
        .vocab-row:hover { background: #fcfaff; }

        .term {
            font-size: 1.1em;
            font-weight: 700;
            color: #5a189a;
            display: block;
            margin-bottom: 4px;
        }

        .definition {
            font-size: 0.9em;
            color: #495057;
            margin-bottom: 6px;
            display: block;
            font-style: italic;
        }

        .example {
            font-size: 0.9em;
            color: #6c757d;
            background: #f8f7ff;
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #c77dff;
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
                overflow-y: auto;
            }
            .container { height: auto; min-height: 100vh; }
            .questions-panel, .vocabulary-panel { height: auto; max-height: 600px; }
        }
    </style>
</head>

        const topicButtonsContainer = document.getElementById('topic-buttons');
        const questionsContainer = document.getElementById('questions-container');
        const vocabularyContainer = document.getElementById('vocabulary-container');

        // Initial Load
        function init() {
            renderButtons();
            loadTopic('teachers'); // Load first topic of this batch
        }

        function renderButtons() {
            Object.keys(topicsData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'topic-btn';
                btn.innerText = topicsData[key].label;
                btn.onclick = () => loadTopic(key);
                btn.dataset.topic = key;
                topicButtonsContainer.appendChild(btn);
            });
        }

        function loadTopic(topicKey) {
            const data = topicsData[topicKey];

            // Update active button state
            document.querySelectorAll('.topic-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.topic === topicKey);
            });

            // 1. Render Questions
            if (data.questions) {
                questionsContainer.innerHTML = data.questions.map((item, index) => `
                    <div class="question-item" onclick="toggleAnswer(this)">
                        <div class="question-text">${item.q}</div>
                        <div class="sample-answer">
                            <strong>Sample Answer:</strong><br>${item.a}
                        </div>
                    </div>
                `).join('');
            } else {
                questionsContainer.innerHTML = '<p style="padding:15px; color:#666;">Questions coming soon for this topic.</p>';
            }

            // 2. Render Vocabulary
            let vocabHTML = '';
            
            // Render Vocab Section
            if (data.vocabulary && data.vocabulary.length > 0) {
                vocabHTML += `
                    <div class="vocab-card">
                        <div class="vocab-header vocab-type">
                            <span>📘</span> Top 10 Vocabulary
                        </div>
                        <div class="vocab-content">
                            ${data.vocabulary.map(v => `
                                <div class="vocab-row">
                                    <span class="term">${v.word}</span>
                                    <span class="definition">${v.def}</span>
                                    <div class="example">"${v.ex}"</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // Render Expressions Section
            if (data.expressions && data.expressions.length > 0) {
                vocabHTML += `
                    <div class="vocab-card">
                        <div class="vocab-header expression-type">
                            <span>💬</span> Top 10 Expressions
                        </div>
                        <div class="vocab-content">
                            ${data.expressions.map(exp => `
                                <div class="vocab-row">
                                    <span class="term">${exp.phrase}</span>
                                    <span class="definition">${exp.def}</span>
                                    <div class="example">"${exp.ex}"</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            if (!vocabHTML) {
                vocabHTML = '<p style="padding:15px; color:#666;">Vocabulary coming soon.</p>';
            }

            vocabularyContainer.innerHTML = vocabHTML;
        }

        // Helper for interaction
        window.toggleAnswer = function(element) {
            const answer = element.querySelector('.sample-answer');
            const isActive = element.classList.contains('active');
            
            // Reset all
            document.querySelectorAll('.question-item').forEach(el => {
                el.classList.remove('active');
                el.querySelector('.sample-answer').classList.remove('show');
            });

            if (!isActive) {
                element.classList.add('active');
                answer.classList.add('show');
            }
        }

        // Start
        init();

    </script>
